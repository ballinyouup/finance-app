server {
    listen 443 ssl;
    listen [::]:443 ssl ipv6only=on;
    server_name moneysim.app www.moneysim.app;

    root /home/bryan/finance-app/frontend/dist;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/moneysim.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/moneysim.app/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /api/ {
        proxy_pass http://127.0.0.1:5050/api/;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
    }

    location / {
        try_files $uri /index.html;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name moneysim.app www.moneysim.app;

    return 301 https://$host$request_uri;
}
